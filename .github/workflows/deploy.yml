name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag (defaults to git SHA)
        required: false
        type: string

  push:
    branches: [main]
    paths:
      - "server/**"
      - "k8s/**"
      - "docker-compose.yaml"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  NAMESPACE: redis-memory

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push mcp-server
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/mcp-server:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "$KUBE_CONFIG_DATA" ] && [ -f "$HOME/.kube/config" ]; then
            echo "Using existing kubeconfig on self-hosted runner"
          elif [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "::error::KUBE_CONFIG secret is empty and no ~/.kube/config on runner."
            exit 1
          elif printf '%s' "$KUBE_CONFIG_DATA" | head -1 | grep -qE '^apiVersion:'; then
            printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
          elif printf '%s' "$KUBE_CONFIG_DATA" | tr -d ' \t\r\n' | base64 -d > "$HOME/.kube/config" 2>/dev/null \
            && [ -s "$HOME/.kube/config" ]; then
            true
          else
            echo "::error::KUBE_CONFIG is not valid."
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"
          kubectl config current-context

      - name: Create GHCR pull secret
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          kubectl create namespace "${{ env.NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="$TOKEN" \
            --namespace="${{ env.NAMESPACE }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          export IMAGE_PREFIX="${{ env.IMAGE_PREFIX }}"
          export NAMESPACE="${{ env.NAMESPACE }}"

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/pvc-redis.yaml
          kubectl apply -f k8s/pvc-embeddings.yaml
          kubectl apply -f k8s/redis-stack.yaml
          kubectl apply -f k8s/embeddings.yaml
          kubectl apply -f k8s/mcp-redis-memory.yaml
          kubectl apply -f k8s/portal.yaml
          kubectl apply -f k8s/ingress.yaml

          kubectl set image deployment/mcp-redis-memory \
            mcp-redis-memory="${IMAGE_PREFIX}/mcp-server:${IMAGE_TAG}" \
            -n "$NAMESPACE"

          kubectl rollout status deployment/redis-stack -n "$NAMESPACE" --timeout=300s
          kubectl rollout status deployment/embeddings -n "$NAMESPACE" --timeout=600s

          kubectl delete job redis-init-index -n "$NAMESPACE" --ignore-not-found
          kubectl apply -f k8s/redis-init-job.yaml
          kubectl wait --for=condition=complete job/redis-init-index -n "$NAMESPACE" --timeout=120s

          kubectl rollout status deployment/mcp-redis-memory -n "$NAMESPACE" --timeout=180s
          kubectl rollout status deployment/redis-memory-portal -n "$NAMESPACE" --timeout=120s

          INGRESS_NS="${INGRESS_NAMESPACE:-ingress-nginx}"
          kubectl patch configmap tcp-services -n "$INGRESS_NS" --type merge \
            -p '{"data":{"3006":"redis-memory/mcp-redis-memory:3006"}}' 2>/dev/null \
            || kubectl apply -f k8s/ingress-tcp.yaml

          kubectl get pods,svc -n "$NAMESPACE"

      - name: Verify MCP TCP port
        run: |
          kubectl run tcp-check-mcp-memory \
            --rm -i --restart=Never \
            --image=busybox:1.36 \
            --namespace="${{ env.NAMESPACE }}" \
            --command -- sh -c "nc -z -w5 mcp-redis-memory.${{ env.NAMESPACE }}.svc.cluster.local 3006"

      - name: Deployment summary
        run: |
          echo "HTTP:  https://monorepo-mcp.dev.stortz.tech/redis-memory/"
          echo "JSON:  https://monorepo-mcp.dev.stortz.tech/redis-memory/endpoints.json"
          echo "MCP:   socat TCP:monorepo-mcp.dev.stortz.tech:3006 STDIO"
