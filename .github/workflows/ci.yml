name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build mcp-server image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          push: false
          tags: redis-memory-mcp/mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo install kubeconform /usr/local/bin/kubeconform

      - name: Validate Kubernetes manifests
        run: kubeconform -summary -ignore-missing-schemas -kubernetes-version 1.29.0 k8s/

  python-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile server modules
        run: python -m py_compile server/memory_mcp.py server/tcp_server.py
