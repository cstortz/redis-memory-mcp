apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-redis-memory
  namespace: redis-memory
  labels:
    app.kubernetes.io/name: mcp-redis-memory
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-redis-memory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-redis-memory
        app.kubernetes.io/component: mcp-server
    spec:
      initContainers:
        - name: wait-redis
          image: redis/redis-stack:latest
          command:
            - bash
            - -c
            - |
              until redis-cli -h redis-stack ping; do echo waiting for redis; sleep 2; done
        - name: wait-embeddings
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              until curl -sf http://embeddings/health; do echo waiting for embeddings; sleep 5; done
      containers:
        - name: mcp-redis-memory
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -c
            - |
              pip install --no-cache-dir "mcp[cli]>=1.0.0" "redis>=5.0.0" "httpx>=0.27.0" "numpy>=1.26.0"
              exec python /app/tcp_server.py
          ports:
            - name: mcp-tcp
              containerPort: 3006
          envFrom:
            - configMapRef:
                name: redis-memory-config
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: src
              mountPath: /app
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: mcp-tcp
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: mcp-tcp
            initialDelaySeconds: 45
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: src
          configMap:
            name: mcp-redis-memory-src
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-redis-memory
  namespace: redis-memory
  labels:
    app.kubernetes.io/name: mcp-redis-memory
spec:
  selector:
    app.kubernetes.io/name: mcp-redis-memory
  ports:
    - name: mcp-tcp
      port: 3006
      targetPort: mcp-tcp
  type: ClusterIP
